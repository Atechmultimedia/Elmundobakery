<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Mundo Bakery — Management System</title>
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=93">
</head>
<body>

<div id="appLoading" class="app-loading">
  <img src="assets/logo.png" alt="El Mundo Bakery" class="app-loading-logo">
  <p>Loading the bakery…</p>
</div>

<div id="appShell" class="app-shell" style="display:none;">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="assets/logo.png" alt="El Mundo Bakery" class="sidebar-logo">
      <div>
        <strong>El Mundo</strong>
        <span>Est. 2026 · Bakery Management</span>
      </div>
    </div>
    <nav id="sideNav" class="side-nav"></nav>
    <div class="sidebar-foot">
      <div class="sidebar-user">
        <span id="userName"></span>
        <span id="userRole" class="sidebar-role"></span>
      </div>
      <button id="logoutBtn" class="btn btn-ghost btn-small">Log out</button>
    </div>
  </aside>

  <div class="main-col">
    <header class="topbar">
      <span id="todayDate"></span>
      <span class="topbar-right">
        <select id="currencySelect" class="currency-select" title="Display currency (amounts are stored in GHS)">
          <option value="GHS">GHS ₵</option>
          <option value="USD">USD $</option>
          <option value="GBP">GBP £</option>
          <option value="__rates">Edit rates…</option>
        </select>
      </span>
    </header>
    <main id="moduleContent" class="module-content"></main>
  </div>

</div>

<div id="modalWrap" class="modal-wrap"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
