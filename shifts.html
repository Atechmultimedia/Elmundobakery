<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shifts — El Mundo Bakery</title>
<meta name="robots" content="noindex">
<link rel="shortcut icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --pine:#08300D; --gold:#F5A508; --gold-soft:#F7C15C; --cream:#EADBC8; --paper:#FBF8F2; --line:#E1D5BB; --oven:#B5432E; --herb:#4C6E3E; }
* { box-sizing: border-box; }
body { margin:0; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; background:var(--pine); font-family:"Work Sans",sans-serif; padding:24px 16px; }
.card { background:var(--paper); border-radius:14px; padding:32px 26px; max-width:440px; width:100%; box-shadow:0 16px 50px rgba(0,0,0,0.35); }
.head { text-align:center; margin-bottom:22px; }
.head img { width:66px; height:66px; object-fit:contain; }
h1 { font-family:"Fraunces",serif; color:var(--pine); font-size:1.35rem; margin:6px 0 2px; }
.sub { font-family:"IBM Plex Mono",monospace; font-size:0.64rem; text-transform:uppercase; letter-spacing:0.12em; color:#6B5D4C; margin:0; }
label { display:block; text-align:left; font-family:"IBM Plex Mono",monospace; font-size:0.66rem; text-transform:uppercase; letter-spacing:0.06em; color:#6B5D4C; margin-bottom:14px; }
select, input { width:100%; margin-top:6px; font-family:"Work Sans",sans-serif; font-size:1.05rem; padding:12px 14px; border:1px solid var(--line); border-radius:8px; background:#fff; }
input { text-align:center; font-family:"IBM Plex Mono",monospace; letter-spacing:0.5em; font-size:1.2rem; }
select:focus, input:focus { outline:none; border-color:var(--gold); }
button { width:100%; font-family:"IBM Plex Mono",monospace; font-size:0.92rem; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; padding:14px; border:none; border-radius:8px; background:var(--gold); color:var(--pine); cursor:pointer; }
button:active { transform:translateY(1px); }
button:disabled { opacity:0.5; }
.msg { display:none; margin-top:14px; padding:12px; border-radius:8px; font-size:0.9rem; }
.msg.bad { display:block; background:#F3DAD3; color:var(--oven); }
.shifts { margin-top:20px; }
.shift-day { display:flex; justify-content:space-between; align-items:center; padding:13px 15px; border:1px solid var(--line); border-radius:9px; margin-bottom:9px; background:#fff; }
.shift-day.today { border-color:var(--gold); background:#FFF9EC; }
.shift-day .day { font-weight:600; color:var(--pine); }
.shift-day .day small { display:block; font-weight:400; font-size:0.72rem; color:#6B5D4C; }
.shift-day .time { font-family:"IBM Plex Mono",monospace; font-size:0.95rem; color:var(--herb); font-weight:600; }
.empty { text-align:center; color:#6B5D4C; padding:20px; font-size:0.92rem; }
.back { display:block; text-align:center; margin-top:18px; font-size:0.8rem; color:#6B5D4C; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>

<div class="card">
  <div class="head">
    <img src="assets/logo.png" alt="El Mundo Bakery">
    <h1>My Shifts</h1>
    <p class="sub">El Mundo Bakery · Powerland, Madina</p>
  </div>

  <form id="lookupForm">
    <label>Your name
      <select id="empName" required><option value="">Loading staff…</option></select>
    </label>
    <label>Your PIN
      <input type="password" id="empPin" inputmode="numeric" maxlength="4" placeholder="••••" required>
    </label>
    <button type="submit" id="lookupBtn">Show my shifts</button>
  </form>
  <p class="msg" id="msg"></p>

  <div class="shifts" id="shiftList" style="display:none;"></div>
  <span class="back" id="backBtn" style="display:none;">← Check another / hide</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBjawN1MXFyPVTgY90dWNmdKMqvuX5bCvQ",
  authDomain: "el-mundo-e976f.firebaseapp.com",
  projectId: "el-mundo-e976f",
  storageBucket: "el-mundo-e976f.firebasestorage.app",
  messagingSenderId: "335945429486",
  appId: "1:335945429486:web:69a225197451b2fb819eff"
});
const db = firebase.firestore();

let pins = [];
db.collection("clock_pins").get().then(snap => {
  pins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const sel = document.getElementById("empName");
  sel.innerHTML = '<option value="">— Select your name —</option>' +
    pins.sort((a, b) => a.name.localeCompare(b.name))
        .map(p => `<option value="${p.id}">${p.name}</option>`).join("");
}).catch(() => showMsg("Could not load staff list — check your connection."));

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
function showMsg(t) { const el = document.getElementById("msg"); el.textContent = t; el.className = "msg bad"; }
function clearMsg() { document.getElementById("msg").className = "msg"; }

document.getElementById("lookupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearMsg();
  const id = document.getElementById("empName").value;
  const pin = document.getElementById("empPin").value.trim();
  const person = pins.find(p => p.id === id);
  const btn = document.getElementById("lookupBtn");
  if (!person) { showMsg("Please select your name."); return; }
  btn.disabled = true;
  try {
    const hash = await sha256Hex(pin);
    if (hash !== person.pin_hash) { showMsg("Wrong PIN — try again."); btn.disabled = false; return; }

    // Pull upcoming shifts for this employee (today onward, next 14 days)
    const todayIso = new Date().toISOString().slice(0, 10);
    const snap = await db.collection("shifts").where("staff_id", "==", person.id).get();
    let shifts = snap.docs.map(d => d.data())
      .filter(s => s.date >= todayIso)
      .sort((a, b) => (a.date + a.start_time).localeCompare(b.date + b.start_time))
      .slice(0, 14);

    renderShifts(person.name, shifts, todayIso);
  } catch (err) {
    showMsg("Something went wrong — check your connection and try again.");
  }
  btn.disabled = false;
});

function renderShifts(name, shifts, todayIso) {
  const list = document.getElementById("shiftList");
  document.getElementById("lookupForm").style.display = "none";
  list.style.display = "block";
  document.getElementById("backBtn").style.display = "block";

  const first = name.split(" ")[0];
  if (!shifts.length) {
    list.innerHTML = `<p class="empty">Hi ${first} — you have no upcoming shifts scheduled. Check back later or ask your manager.</p>`;
    return;
  }
  list.innerHTML = `<p style="text-align:center;margin:0 0 14px;color:var(--pine);"><strong>Hi ${first}</strong>, your upcoming shifts:</p>` +
    shifts.map(s => {
      const d = new Date(s.date);
      const isToday = s.date === todayIso;
      return `
        <div class="shift-day ${isToday ? "today" : ""}">
          <span class="day">${d.toLocaleDateString(undefined, { weekday: "long" })}
            <small>${d.toLocaleDateString(undefined, { day: "numeric", month: "long" })}${isToday ? " · Today" : ""}</small>
          </span>
          <span class="time">${s.start_time} – ${s.end_time}</span>
        </div>`;
    }).join("");
}

document.getElementById("backBtn").addEventListener("click", () => {
  document.getElementById("shiftList").style.display = "none";
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("lookupForm").style.display = "block";
  document.getElementById("empPin").value = "";
  clearMsg();
});
</script>
</body>
</html>
